# ============================================================
# Asset Maintenance Management System - Application Properties
# ============================================================

# Application name
spring.application.name=asset-maintenance-system

# ---- H2 In-Memory Database Configuration ----
spring.datasource.url=jdbc:h2:mem:assetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- H2 Console ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Server ----
server.port=8081

# ---- Logging ----
logging.level.com.example.assetmaintenance=DEBUG
logging.level.org.springframework.web=INFO
